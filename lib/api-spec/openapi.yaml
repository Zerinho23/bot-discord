openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: guilds
    description: Guild management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
          description: Healthy

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Current user
        "401":
          description: Not authenticated

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /guilds:
    get:
      operationId: listGuilds
      tags: [guilds]
      summary: List guilds
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guild"
          description: List of guilds

  /guilds/{guildId}:
    get:
      operationId: getGuild
      tags: [guilds]
      summary: Get guild
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guild"
          description: Guild

  /guilds/{guildId}/stats:
    get:
      operationId: getGuildStats
      tags: [guilds]
      summary: Get guild stats
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuildStats"
          description: Guild stats

  /guilds/{guildId}/verification:
    get:
      operationId: getVerificationConfig
      tags: [guilds]
      summary: Get verification config
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationConfig"
          description: Verification config
    patch:
      operationId: updateVerificationConfig
      tags: [guilds]
      summary: Update verification config
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerificationConfigInput"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationConfig"
          description: Updated config

  /guilds/{guildId}/welcome:
    get:
      operationId: getWelcomeConfig
      tags: [guilds]
      summary: Get welcome config
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WelcomeConfig"
          description: Welcome config
    patch:
      operationId: updateWelcomeConfig
      tags: [guilds]
      summary: Update welcome config
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WelcomeConfigInput"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WelcomeConfig"
          description: Updated config

  /guilds/{guildId}/welcome/test:
    post:
      operationId: testWelcomeEmbed
      tags: [guilds]
      summary: Send a test welcome embed to the configured channel
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
          description: Test sent
        "400":
          description: No channel configured or bot not ready

  /guilds/{guildId}/tickets/config:
    get:
      operationId: getTicketConfig
      tags: [guilds]
      summary: Get ticket config
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketConfig"
          description: Ticket config
    patch:
      operationId: updateTicketConfig
      tags: [guilds]
      summary: Update ticket config
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketConfigInput"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketConfig"
          description: Updated config

  /guilds/{guildId}/tickets:
    get:
      operationId: listTickets
      tags: [guilds]
      summary: List tickets
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
          description: List of tickets

  /guilds/{guildId}/moderation/config:
    get:
      operationId: getModerationConfig
      tags: [guilds]
      summary: Get moderation config
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerationConfig"
          description: Moderation config
    patch:
      operationId: updateModerationConfig
      tags: [guilds]
      summary: Update moderation config
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerationConfigInput"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModerationConfig"
          description: Updated config

  /guilds/{guildId}/moderation/actions:
    get:
      operationId: listModerationActions
      tags: [guilds]
      summary: List moderation actions
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModerationAction"
          description: List of actions

  /guilds/{guildId}/invites:
    get:
      operationId: listInviteStats
      tags: [guilds]
      summary: List invite stats
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InviteStat"
          description: Invite stats

  /guilds/{guildId}/invites/config:
    get:
      operationId: getInviteConfig
      tags: [guilds]
      summary: Get invite config
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteConfig"
          description: Invite config
    patch:
      operationId: updateInviteConfig
      tags: [guilds]
      summary: Update invite config
      parameters:
        - name: guildId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteConfigInput"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteConfig"
          description: Updated config

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    User:
      type: object
      required: [id, username]
      properties:
        id:
          type: string
        username:
          type: string
        avatar:
          type: ["string", "null"]
        guilds:
          type: array
          items:
            $ref: "#/components/schemas/Guild"

    Guild:
      type: object
      required: [id, name, botPresent]
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: ["string", "null"]
        memberCount:
          type: integer
        botPresent:
          type: boolean

    GuildStats:
      type: object
      required: [totalMembers, totalWarnings, totalBans, totalTickets, openTickets, totalInvites]
      properties:
        totalMembers:
          type: integer
        totalWarnings:
          type: integer
        totalBans:
          type: integer
        totalTickets:
          type: integer
        openTickets:
          type: integer
        totalInvites:
          type: integer
        recentActions:
          type: array
          items:
            $ref: "#/components/schemas/ModerationAction"

    VerificationConfig:
      type: object
      required: [guildId, enabled]
      properties:
        guildId:
          type: string
        enabled:
          type: boolean
        channelId:
          type: ["string", "null"]
        roleId:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        embedTitle:
          type: ["string", "null"]
        embedDescription:
          type: ["string", "null"]
        embedColor:
          type: ["string", "null"]
        buttonLabel:
          type: ["string", "null"]
        buttonEmoji:
          type: ["string", "null"]

    VerificationConfigInput:
      type: object
      properties:
        enabled:
          type: boolean
        channelId:
          type: ["string", "null"]
        roleId:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        embedTitle:
          type: ["string", "null"]
        embedDescription:
          type: ["string", "null"]
        embedColor:
          type: ["string", "null"]
        buttonLabel:
          type: ["string", "null"]
        buttonEmoji:
          type: ["string", "null"]

    WelcomeConfig:
      type: object
      required: [guildId, enabled, dmEnabled]
      properties:
        guildId:
          type: string
        enabled:
          type: boolean
        channelId:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        dmEnabled:
          type: boolean
        dmMessage:
          type: ["string", "null"]
        embedTitle:
          type: ["string", "null"]
        embedDescription:
          type: ["string", "null"]
        embedColor:
          type: ["string", "null"]
        embedFooter:
          type: ["string", "null"]
        embedImage:
          type: ["string", "null"]
        embedThumbnail:
          type: ["string", "null"]
        embedAuthorName:
          type: ["string", "null"]
        autoRoleId:
          type: ["string", "null"]

    WelcomeConfigInput:
      type: object
      properties:
        enabled:
          type: boolean
        channelId:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        dmEnabled:
          type: boolean
        dmMessage:
          type: ["string", "null"]
        embedTitle:
          type: ["string", "null"]
        embedDescription:
          type: ["string", "null"]
        embedColor:
          type: ["string", "null"]
        embedFooter:
          type: ["string", "null"]
        embedImage:
          type: ["string", "null"]
        embedThumbnail:
          type: ["string", "null"]
        embedAuthorName:
          type: ["string", "null"]
        autoRoleId:
          type: ["string", "null"]

    TicketConfig:
      type: object
      required: [guildId, enabled]
      properties:
        guildId:
          type: string
        enabled:
          type: boolean
        channelId:
          type: ["string", "null"]
        categoryId:
          type: ["string", "null"]
        staffRoleId:
          type: ["string", "null"]
        supportRoleId:
          type: ["string", "null"]
        logChannelId:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        embedTitle:
          type: ["string", "null"]
        embedDescription:
          type: ["string", "null"]
        embedColor:
          type: ["string", "null"]
        buttonLabel:
          type: ["string", "null"]
        buttonEmoji:
          type: ["string", "null"]

    TicketConfigInput:
      type: object
      properties:
        enabled:
          type: boolean
        channelId:
          type: ["string", "null"]
        categoryId:
          type: ["string", "null"]
        staffRoleId:
          type: ["string", "null"]
        supportRoleId:
          type: ["string", "null"]
        logChannelId:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        embedTitle:
          type: ["string", "null"]
        embedDescription:
          type: ["string", "null"]
        embedColor:
          type: ["string", "null"]
        buttonLabel:
          type: ["string", "null"]
        buttonEmoji:
          type: ["string", "null"]

    Ticket:
      type: object
      required: [id, guildId, channelId, userId, status]
      properties:
        id:
          type: integer
        guildId:
          type: string
        channelId:
          type: string
        userId:
          type: string
        status:
          type: string
        createdAt:
          type: ["string", "null"]
        closedAt:
          type: ["string", "null"]

    ModerationConfig:
      type: object
      required: [guildId, enabled, autoModEnabled, maxWarnings]
      properties:
        guildId:
          type: string
        enabled:
          type: boolean
        logChannelId:
          type: ["string", "null"]
        muteRoleId:
          type: ["string", "null"]
        autoModEnabled:
          type: boolean
        maxWarnings:
          type: integer

    ModerationConfigInput:
      type: object
      properties:
        enabled:
          type: boolean
        logChannelId:
          type: ["string", "null"]
        muteRoleId:
          type: ["string", "null"]
        autoModEnabled:
          type: boolean
        maxWarnings:
          type: integer

    ModerationAction:
      type: object
      required: [id, guildId, userId, moderatorId, type]
      properties:
        id:
          type: integer
        guildId:
          type: string
        userId:
          type: string
        moderatorId:
          type: string
        type:
          type: string
        reason:
          type: ["string", "null"]
        createdAt:
          type: ["string", "null"]

    InviteStat:
      type: object
      required: [id, guildId, userId, regularInvites, leftInvites, fakeInvites]
      properties:
        id:
          type: integer
        guildId:
          type: string
        userId:
          type: string
        username:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        inviterId:
          type: ["string", "null"]
        regularInvites:
          type: integer
        leftInvites:
          type: integer
        fakeInvites:
          type: integer

    InviteConfig:
      type: object
      required: [guildId, enabled]
      properties:
        guildId:
          type: string
        enabled:
          type: boolean
        channelId:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        announceChannelId:
          type: ["string", "null"]
        announceMessage:
          type: ["string", "null"]

    InviteConfigInput:
      type: object
      properties:
        enabled:
          type: boolean
        channelId:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        announceChannelId:
          type: ["string", "null"]
        announceMessage:
          type: ["string", "null"]
